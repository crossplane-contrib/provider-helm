apiVersion: helm.crossplane.io/v1beta1
kind: Release
metadata:
  name: wordpress-version-digest-example
spec:
  forProvider:
    chart:
      # Using both version and digest in URL format
      # Digest takes precedence and ensures immutability
      url: "oci://localhost:5000/helm-charts/wordpress:15.2.5@sha256:d1c2884a2ac2d2f80fb1bf384e45b4cc72669498ccd237843dcc63bfcac810a3"
    namespace: wordpress
    values:
      service:
        type: ClusterIP
  providerConfigRef:
    name: helm-provider
